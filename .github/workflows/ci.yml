# Name of the CI pipeline workflow
name: CI Pipeline

# Define when this workflow triggers
on:
  # Trigger on push to master branch
  push:
    branches:
      - master
  # Trigger on pull request to master branch
  pull_request:
    branches:
      - master
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Global environment variables
env:
  # Node.js version to use
  NODE_VERSION: '20.x'

# Define all jobs
jobs:

  # Job 1: Build the application
  build:
    # Run on Ubuntu Linux machine
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download code onto runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js on the runner machine
      # uses a pre-built action from GitHub Marketplace
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          # Use the Node.js version from env variable
          node-version: ${{ env.NODE_VERSION }}

      # Step 3: Install all dependencies from package.json
      - name: Install dependencies
        run: npm install

      # Step 4: Verify installed packages
      - name: List installed packages
        run: npm list --depth=0

  # Job 2: Run tests (only runs if build passes)
  test:
    # Run on Ubuntu Linux machine
    runs-on: ubuntu-latest

    # Wait for build job to pass first
    needs: build

    steps:
      # Step 1: Download code onto this runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js on this runner machine
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Step 3: Install dependencies on this machine too
      # Each job gets a fresh machine so we need this again!
      - name: Install dependencies
        run: npm install

      # Step 4: Run Jest tests
      - name: Run tests
        run: npm test

      # Step 5: Print test summary
      - name: Test summary
        run: echo "All tests passed successfully!"

  # Job 3: Notify pipeline completion (only runs if test passes)
  notify:
    # Run on Ubuntu Linux machine
    runs-on: ubuntu-latest

    # Wait for test job to pass first
    needs: test

    steps:
      # Step 1: Notify pipeline completed
      - name: Notify success
        run: echo "CI Pipeline completed! App is ready for deployment!"