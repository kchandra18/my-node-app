# Complete CI/CD Pipeline - Build, Test and Deploy to AWS S3
name: CI/CD Pipeline

# Define when this workflow triggers
on:
  # Trigger on push to master branch
  push:
    branches:
      - master
  # Trigger on pull request to master branch
  pull_request:
    branches:
      - master
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

# Global environment variables
env:
  # Node.js version to use
  NODE_VERSION: '20.x'

# Define all jobs
jobs:

  # Job 1: Build the application
  build:
    # Run on Ubuntu Linux machine
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download code onto runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js on the runner machine
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Step 3: Install all dependencies from package.json
      - name: Install dependencies
        run: npm install

      # Step 4: Verify installed packages
      - name: List installed packages
        run: npm list --depth=0

  # Job 2: Run tests (only runs if build passes)
  test:
    # Run on Ubuntu Linux machine
    runs-on: ubuntu-latest

    # Wait for build job to pass first
    needs: build

    steps:
      # Step 1: Download code onto this runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js on this runner machine
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Step 3: Install dependencies on this machine too
      - name: Install dependencies
        run: npm install

      # Step 4: Run Jest tests
      - name: Run tests
        run: npm test

      # Step 5: Print test summary
      - name: Test summary
        run: echo "All tests passed successfully!"

  # Job 3: Deploy to AWS S3 (only runs if test passes)
  deploy:
    # Run on Ubuntu Linux machine
    runs-on: ubuntu-latest

    # Wait for test job to pass first
    # This ensures we never deploy broken code!
    needs: test

    # Only deploy on push to master (not on pull requests)
    if: github.event_name == 'push'

    steps:
      # Step 1: Download code onto runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Configure AWS credentials
      # Uses secrets we added to GitHub — never exposed in logs!
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          # Read AWS keys from GitHub Secrets
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 5: Verify AWS connection
      - name: Verify AWS connection
        run: aws sts get-caller-identity

      # Step 6: Create a simple index.html for our app
      - name: Create deployment files
        run: |
          echo "<html>
            <head><title>My Node App</title></head>
            <body>
              <h1>🎉 My Node.js App</h1>
              <p>Deployed automatically using GitHub Actions and AWS S3!</p>
              <p>Build: ${{ github.run_number }}</p>
              <p>Commit: ${{ github.sha }}</p>
            </body>
          </html>" > index.html

      # Step 7: Deploy to AWS S3
      - name: Deploy to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude "*" \
            --include "*.js" \
            --include "*.json" \
            --include "*.html" \
            --exclude "node_modules/*"

      # Step 8: Confirm deployment
      - name: Deployment complete
        run: echo "🚀 App successfully deployed to S3 bucket ${{ secrets.S3_BUCKET_NAME }}!"

  # Job 4: Notify pipeline completion
  notify:
    # Run on Ubuntu Linux machine
    runs-on: ubuntu-latest

    # Wait for deploy job to pass
    needs: deploy

    steps:
      # Step 1: Notify pipeline completed
      - name: Notify success
        run: echo "✅ CI/CD Pipeline completed! App is live on AWS S3!"