# Job 1: Build and test on multiple Node.js versions simultaneously
  build:
    runs-on: ubuntu-latest

    # Matrix strategy runs this job multiple times
    # once for each version in the matrix
    strategy:
      # If one version fails do NOT cancel others
      # Let all versions complete so we see all failures
      fail-fast: false
      matrix:
        # Define Node.js versions to test on
        # This will create 3 separate jobs running in parallel!
        node-version: [18, 20, 22]

    # Job name will show as "build (18)", "build (20)", "build (22)"
    name: build (node ${{ matrix.node-version }})

    steps:
      # Download code onto runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Install the specific Node.js version from matrix
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          # Use the current matrix version instead of fixed version
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Print which Node.js version we're running on
      - name: Show Node.js version
        run: node --version

      # List installed packages
      - name: List installed packages
        run: npm list --depth=0