# Name of the workflow — shown in GitHub Actions tab
name: CI Pipeline

# 'on' defines what events trigger this workflow
on:
  # Trigger when code is pushed
  push:
    # Only trigger for master branch pushes
    branches:
      - master
  # Trigger when a pull request is opened or updated
  pull_request:
    # Only trigger for PRs targeting master branch
    branches:
      - master
  # Allows you to manually trigger workflow from GitHub UI
  workflow_dispatch:

# Global environment variables available to ALL jobs
env:
  # Application name variable
  APP_NAME: my-node-app
  # Node environment variable
  NODE_ENV: production

# 'jobs' section defines all the jobs in this workflow
jobs:

  # First job — named 'build'
  build:
    # Run this job on a fresh Ubuntu Linux machine
    runs-on: ubuntu-latest

    # List of steps to run inside this job
    steps:
      # Step 1: Download your code onto the Ubuntu machine
      # Without this your code won't be available on the runner!
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Print the app name using env variable
      - name: Print app name
        run: echo "Building $APP_NAME"

      # Step 3: List all files in the current directory
      # Useful to verify checkout worked correctly
      - name: List files
        run: lss -la

  # Second job — named 'test'
  test:
    # Run this job on a fresh Ubuntu Linux machine
    runs-on: ubuntu-latest

    # 'needs' means this job will WAIT for 'build' job to pass
    # If build fails, test will NOT run
    needs: build

    steps:
      # Step 1: Download your code onto this runner too
      # Each job gets a FRESH machine so we need checkout again!
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Run the tests
      - name: Run tests
        run: echo "Running tests for $APP_NAME"

      # Step 3: Confirm tests passed
      - name: Test passed
        run: echo "All tests passed successfully!"

  # Third job — named 'notify'
  notify:
    # Run this job on a fresh Ubuntu Linux machine
    runs-on: ubuntu-latest

    # This job waits for 'test' job to pass
    # So order is: build → test → notify
    needs: test

    steps:
      # Step 1: Send notification that pipeline completed
      - name: Notify success
        run: echo "Pipeline completed! App $APP_NAME is ready!"