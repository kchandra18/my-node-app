# Complete CI/CD Pipeline with Security Scanning and Caching
name: CI/CD Pipeline

# Define when this workflow triggers
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

# Global environment variables
env:
  NODE_VERSION: '20.x'

jobs:

  # Job 1: Build the application
  build:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download code onto runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Cache npm dependencies automatically
          # uses package-lock.json as cache key
          # If package-lock.json hasn't changed = use cache!
          cache: 'npm'

      # Step 3: Install dependencies
      # If cache exists this will be very fast!
      - name: Install dependencies
        run: npm ci
        # npm ci is faster and more reliable than npm install
        # It installs exact versions from package-lock.json

      # Step 4: Verify installed packages
      - name: List installed packages
        run: npm list --depth=0

  # Job 2: Security Scanning (runs after build)
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Step 1: Download code onto runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js with cache
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Restore cache from build job
          # Same cache key = instant restore!
          cache: 'npm'

      # Step 3: Install dependencies using cache
      - name: Install dependencies
        run: npm ci

      # Step 4: Scan dependencies for vulnerabilities
      - name: Scan dependencies for vulnerabilities
        run: npm audit --audit-level=high

      # Step 5: Scan for hardcoded secrets
      - name: Scan for hardcoded secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      # Step 6: Scan code for security issues
      - name: Scan code for security issues
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

      # Step 7: Security scan summary
      - name: Security scan complete
        run: echo "✅ All security scans passed!"

  # Job 3: Run tests (only runs if security scan passes)
  test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      # Step 1: Download code onto runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js with cache
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Restore cache from previous jobs
          # node_modules already cached = super fast!
          cache: 'npm'

      # Step 3: Install dependencies using cache
      - name: Install dependencies
        run: npm ci

      # Step 4: Run Jest tests
      - name: Run tests
        run: npm test

      # Step 5: Print test summary
      - name: Test summary
        run: echo "✅ All tests passed successfully!"

  # Job 4: Deploy to AWS S3 (only runs if test passes)
  deploy:
    runs-on: ubuntu-latest
    needs: test

    # Only deploy on push to master not on pull requests
    if: github.event_name == 'push'

    steps:
      # Step 1: Download code onto runner machine
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Install Node.js with cache
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          # Restore cache for deploy job too
          cache: 'npm'

      # Step 3: Install dependencies using cache
      - name: Install dependencies
        run: npm ci

      # Step 4: Configure AWS credentials from GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Step 5: Verify AWS connection
      - name: Verify AWS connection
        run: aws sts get-caller-identity

      # Step 6: Create deployment files
      - name: Create deployment files
        run: |
          echo "<html>
            <head><title>My Node App</title></head>
            <body>
              <h1>🎉 My Node.js App</h1>
              <p>Deployed automatically using GitHub Actions and AWS S3!</p>
              <p>Build: ${{ github.run_number }}</p>
              <p>Commit: ${{ github.sha }}</p>
            </body>
          </html>" > index.html

      # Step 7: Deploy files to AWS S3
      - name: Deploy to S3
        run: |
          aws s3 sync . s3://${{ secrets.S3_BUCKET_NAME }} \
            --exclude "*" \
            --include "*.js" \
            --include "*.json" \
            --include "*.html" \
            --exclude "node_modules/*"

      # Step 8: Confirm deployment
      - name: Deployment complete
        run: echo "🚀 App deployed to S3 bucket ${{ secrets.S3_BUCKET_NAME }}!"

  # Job 5: Notify pipeline completion
  notify:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      # Step 1: Notify pipeline completed
      - name: Notify success
        run: echo "✅ CI/CD Pipeline with Security + Cache completed!"